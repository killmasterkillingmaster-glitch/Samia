name: Encode Bot

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task Type'
        required: true
      video_id:
        description: 'Video ID'
        required: true
      sub_id:
        description: 'Subtitle ID'
        required: false
      chat_id:
        description: 'Chat ID'
        required: true
      user_id:
        description: 'User ID'
        required: true
      resolution:
        description: 'Resolution'
        required: false
      wm_id:
        description: 'Watermark ID'
        required: false
      wm_pos:
        description: 'Watermark Position'
        required: false
      rename:
        description: 'Rename'
        required: false
      font_link:
        description: 'Font Link'
        required: false
      trigger_msg_id:
        description: 'Trigger Message ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pyrogram tgcrypto requests
      - name: Run Encoder
        run: |
          python encorder.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          USER_ID: ${{ github.event.inputs.user_id }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
          WM_ID: ${{ github.event.inputs.wm_id }}
          WM_POS: ${{ github.event.inputs.wm_pos }}
          RENAME: ${{ github.event.inputs.rename }}
          FONT_LINK: ${{ github.event.inputs.font_link }}
          TRIGGER_MSG_ID: ${{ github.event.inputs.trigger_msg_id }}
