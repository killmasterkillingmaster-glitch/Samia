name: Video Encoder Workflow

# Auto-Queue System (Single Task Execution)
concurrency:
  group: processing
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      task_type:
        required: true
      video_id:
        required: true
      sub_id:
        required: true
      chat_id:
        required: true
      user_id:
        required: true
      resolution:
        required: true
      wm_id:
        required: true
      wm_pos:
        required: true
      rename:
        required: true
      font_link:
        required: true
      trigger_msg_id:
        required: true

jobs:
  encode_job:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bin Directory
        run: mkdir -p ${{ github.workspace }}/bin

      # Static FFmpeg binary cache setup to prevent redownloads across workflow triggers
      - name: Cache FFmpeg Binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/bin
          key: ${{ runner.os }}-ffmpeg-static-v2

      - name: Install FFmpeg Static (On Cache Miss)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}/bin
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz --strip-components=1
          rm -f ffmpeg-release-amd64-static.tar.xz

      - name: Configure System Path & Fontconfig
        run: |
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH
          sudo apt-get update && sudo apt-get install -y fontconfig

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Automated caching of Python package downloads

      - name: Install Python Dependencies
        run: pip install pyrogram tgcrypto pysubs2 requests fonttools
        
      - name: Run Dedicated Video Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          SUB_ID: ${{ github.event.inputs.sub_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          USER_ID: ${{ github.event.inputs.user_id }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
          WM_ID: ${{ github.event.inputs.wm_id }}
          WM_POS: ${{ github.event.inputs.wm_pos }}
          RENAME: ${{ github.event.inputs.rename }}
          FONT_LINK: ${{ github.event.inputs.font_link }}
          TRIGGER_MSG_ID: ${{ github.event.inputs.trigger_msg_id }}
        run: python encorder.py
        
      - name: Cleanup Temporary Assets
        if: always()
        run: |
          # Deletes media assets safely without breaking the cached 'bin' directory
          rm -f video.mkv watermark.png ready_sub.ass custom_font.ttf raw_sub.ass raw_sub.srt output.mp4 *.mp4 *.ass *.srt
